<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naše Firma</title>

  <!-- Font Awesome pro sociální ikony -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Základní reset */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { line-height: 1.6; color: #205797; background-color: #fff; }

    /* Hlavička */
    header {
      position: fixed;
      width: 100%;
      top: 0;
      left: 0;
      background-color: #205797;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    header img { height: 50px; }
    nav a { color: white; margin-left: 20px; font-weight: bold; transition: 0.3s; }
    nav a:hover { opacity: 0.8; }

    main { padding-top: 90px; }

    /* Sekce */
    section { padding: 80px 20px; text-align: center; }
    section:nth-child(even) { background-color: #205797; color: white; }
    section h1, section h2 { margin-bottom: 20px; }

    /* Portfolio */
    .portfolio { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .portfolio img {
      width: 300px;
      border: 3px solid #205797;
      border-radius: 10px;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .portfolio img:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Formulář */
    form {
      max-width: 500px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      color: #205797;
    }
    input, textarea {
      padding: 12px;
      border: 2px solid #205797;
      border-radius: 5px;
      width: 100%;
    }
    button {
      background-color: #205797;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }
    button:hover { background-color: #104a86; }

    /* Sociální sítě */
    .social { margin-top: 20px; }
    .social a { font-size: 32px; margin: 0 15px; color: inherit; transition: 0.3s; }
    .social a:hover { color: #104a86; }

    /* Footer */
    footer {
      background-color: #205797;
      color: white;
      padding: 25px 20px;
      text-align: center;
    }

    /* Responsivita */
    @media (max-width: 768px) {
      .portfolio { flex-direction: column; }
      nav { flex-direction: column; gap: 10px; align-items: center; margin-top: 10px; }
    }
  </style>
</head>
<body>

  <!-- Hlavička -->
  <header>
    <img src="images/logo.png" alt="Logo firmy">
    <nav>
      <a href="#about">O nás</a>
      <a href="#portfolio">Ukázka práce</a>
      <a href="#contact">Kontakt</a>
    </nav>
  </header>

  <main>
    <!-- O nás -->
    <section id="about">
      <h1>O nás</h1>
      <p>Jsme tým profesionálů, který se specializuje na [vaše služby]. Naším cílem je poskytovat kvalitní a spolehlivé řešení pro naše klienty.</p>
    </section>

    <!-- Ukázka práce -->
    <section id="portfolio">
      <h2>Ukázka naší práce</h2>
      <div class="portfolio">
        <img src="images/prace1.jpg" alt="Ukázka práce 1">
        <img src="images/prace2.jpg" alt="Ukázka práce 2">
        <img src="images/prace3.jpg" alt="Ukázka práce 3">
      </div>
    </section>

    <!-- Kontakt -->
    <section id="contact">
      <h2>Kontaktujte nás</h2>
      <form action="https://formspree.io/f/yourformid" method="POST">
        <input type="text" name="name" placeholder="Vaše jméno" required>
        <input type="email" name="email" placeholder="Váš email" required>
        <textarea name="message" placeholder="Vaše zpráva" rows="5" required></textarea>
        <button type="submit">Odeslat</button>
      </form>
      <div class="social">
        <a href="https://instagram.com/vaseprofil" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@vaseprofil" target="_blank"><i class="fab fa-tiktok"></i></a>
      </div>
    </section>
  </main>

  <footer>
    &copy; 2026 Naše Firma
  </footer>

</body>
</html>
