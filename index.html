<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naše Firma</title>

  <!-- Font Awesome pro sociální ikony -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Reset a základní styl */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background-color: #fff; color: #205797; line-height: 1.6; }
    a { color: #205797; text-decoration: none; }
    img { max-width: 100%; height: auto; }

    /* Header */
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background-color: #fff; border-bottom: 2px solid #205797; flex-wrap: wrap; }
    header img { height: 50px; }
    nav a { margin-left: 20px; font-weight: bold; }
    nav { display: flex; flex-wrap: wrap; gap: 15px; }

    /* Sekce */
    section { padding: 60px 20px; text-align: center; }
    h1, h2 { margin-bottom: 20px; }

    /* Portfolio */
    .portfolio { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
    .portfolio img { width: 300px; border: 2px solid #205797; border-radius: 8px; }

    /* Formulář */
    form { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
    input, textarea { padding: 10px; border: 2px solid #205797; border-radius: 5px; width: 100%; }
    button { background-color: #205797; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background-color: #104a86; }

    /* Sociální sítě */
    .social { margin-top: 20px; }
    .social a { font-size: 28px; margin: 0 15px; color: #205797; transition: 0.3s; }
    .social a:hover { color: #104a86; }

    /* Footer */
    footer { padding: 20px; text-align: center; border-top: 2px solid #205797; margin-top: 40px; }

    /* Responsivita */
    @media (max-width: 768px) {
      .portfolio { flex-direction: column; }
      nav { justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Header s logem a menu -->
  <header>
    <img src="images/logo.png" alt="Logo firmy">
    <nav>
      <a href="#about">O nás</a>
      <a href="#portfolio">Ukázka naší práce</a>
      <a href="#contact">Kontakt</a>
    </nav>
  </header>

  <!-- O nás -->
  <section id="about">
    <h1>O nás</h1>
    <p>Jsme tým profesionálů, který se specializuje na [vaše služby]. Naším cílem je poskytovat kvalitní a spolehlivé řešení pro naše klienty.</p>
  </section>

  <!-- Ukázka práce -->
  <section id="portfolio">
    <h2>Ukázka naší práce</h2>
    <div class="portfolio">
      <img src="images/prace1.jpg" alt="Ukázka práce 1">
      <img src="images/prace2.jpg" alt="Ukázka práce 2">
      <img src="images/prace3.jpg" alt="Ukázka práce 3">
    </div>
  </section>

  <!-- Kontakt -->
  <section id="contact">
    <h2>Kontaktujte nás</h2>
    <form action="https://formspree.io/f/yourformid" method="POST">
      <input type="text" name="name" placeholder="Vaše jméno" required>
      <input type="email" name="email" placeholder="Váš email" required>
      <textarea name="message" placeholder="Vaše zpráva" rows="5" required></textarea>
      <button type="submit">Odeslat</button>
    </form>

    <div class="social">
      <a href="https://instagram.com/vaseprofil" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@vaseprofil" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </section>

  <footer>
    &copy; 2026 Naše Firma
  </footer>

</body>
</html>
